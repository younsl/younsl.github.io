{{ if .Page.Store.Get "hasMermaid" }}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@latest/dist/mermaid.esm.min.mjs';
    let mermaidTheme = 'dark';
    mermaid.initialize({
      startOnLoad: true,
      theme: mermaidTheme,
      flowchart: {
        useMaxWidth: true,
        htmlLabels: false, // Disable HTML labels to increase rendering speed
        padding: 0,
        nodeSpacing: 0,
      },
    });
  </script>
{{ end }}
