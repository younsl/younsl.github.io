{{ define "main" }}
<p><a href="{{ $.Site.Params.theme_config.titleLink | default "/about" | relURL }}">{{ $.Site.Title }}</a></p>
{{ if $.Site.Params.description }}<p>{{ $.Site.Params.description }}</p>{{ end }}
{{ .Content }}
{{ range where .Site.RegularPages "Section" "blog" }}
<p class="post-item">
<time>{{ .Date.Format "2006-01" }}</time> <a href="{{ .Permalink }}">{{ .Title }}</a>
</p>
{{ end }}
{{ end }}
